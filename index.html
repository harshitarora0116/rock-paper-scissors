<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">ROCK, PAPER, SCISSORS</div>
    <div class="choose">
            <div class="choose_text">Choose one!</div>
            <div class="choices">
                <div class="rock"><img src="images/rock.png" alt="rock" style="height:120px;" class="rock">Rock</div> 
                <div class="paper"><img src="images/paper.png" alt="" style="height:120px;">Paper</div> 
                <div class="scissors"><img src="images/scissors.png" alt="" style="height:120px;">Scissors</div> 
            </div>
    </div>
    <div class="hands">
        <div class="player"> <img src="" alt="">
            <div class="player_text" style="display: flex; justify-content: center;">Player</div>
        </div>
        <div class="computer"> <img src="" alt="">
            <div class="computer_text" style="display: flex; justify-content: center">Computer</div>
        </div>
    </div>
    <div class="choice_parent" style="display: flex;">
        <div class="your_choice" style="display: flex;flex-direction: column; justify-content: center;">Your choice:
        </div>
        <div class="choice" style="color:gold; display: flex; flex-direction: column; justify-content: center;">
        </div>
    </div>
    <div class="play">
        PLAY
    </div>
        <div class="result" style="display: flex;flex-direction: column; justify-content: center; color:gold; font-size:2rem;">Result: </div>
    <script src="script.js"></script>
</body>
</html>
